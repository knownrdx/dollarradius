version: "3"
services:
  radius-mysql:
    image: mariadb:10
    container_name: radius-mysql
    restart: unless-stopped
    environment:
      - MYSQL_DATABASE=radius
      - MYSQL_USER=radius
      - MYSQL_PASSWORD=radiusdbpw
      - MYSQL_ROOT_PASSWORD=radiusrootdbpw
    volumes:
      - radius-mysql:/var/lib/mysql

  radius:
    image: 3x3cut0r/freeradius:latest
    container_name: radius
    restart: unless-stopped
    depends_on:
      - radius-mysql
    expose:
      - "1812/udp"
      - "1813/udp"
    environment:
      - MYSQL_HOST=radius-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=radius
      - MYSQL_USER=radius
      - MYSQL_PASSWORD=radiusdbpw
      - DEFAULT_CLIENT_SECRET=testing123
    volumes:
      - radius-data:/data
      - radius-logs:/var/log/freeradius

  radius-web:
    image: 3x3cut0r/daloradius:latest
    container_name: radius-web
    restart: unless-stopped
    depends_on:
      - radius
      - radius-mysql
    ports:
      - "8080:80"
    environment:
      - MYSQL_HOST=radius-mysql
      - MYSQL_PORT=3306
      - MYSQL_DATABASE=radius
      - MYSQL_USER=radius
      - MYSQL_PASSWORD=radiusdbpw
      - DEFAULT_CLIENT_SECRET=testing123
      - DEFAULT_FREERADIUS_SERVER=radius
      - MAIL_SMTPADDR=127.0.0.1
      - MAIL_PORT=25
      - MAIL_FROM=root@daloradius.xdsl.by
      - MAIL_AUTH=
    volumes:
      - radius-web:/data
      - radius-logs:/var/log/freeradius

volumes:
  radius-mysql:
  radius-data:
  radius-logs:
  radius-web:
